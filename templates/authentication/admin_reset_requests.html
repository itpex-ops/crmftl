{% extends 'layouts/base.html' %}

{% block content %}

<h3>Password Reset Requests</h3>

<table class="table table-bordered">
    <tr>
        <th>User</th>
        <th>Reason</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    {% for r in requests %}
    <tr>
        <td>{{ r.user.username }}</td>
        <td>{{ r.reason }}</td>
        <td>{{ r.status }}</td>
        <td>
            {% if r.status == 'pending' %}
                <a href="{% url 'approve_reset' r.id %}" class="btn btn-success btn-sm">Approve</a>
                <a href="{% url 'reject_reset' r.id %}" class="btn btn-danger btn-sm">Reject</a>
            {% else %}
                -
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
