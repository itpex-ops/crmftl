<style>
    .timeline {
        position: relative;
        margin: 40px 0;
        padding-left: 50px;
    }

    .timeline-step {
        position: relative;
        margin-bottom: 40px;
        transition: all 0.3s ease;
    }

    .timeline-step .circle {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        position: absolute;
        left: 0;
        top: 0;
        border: 3px solid #ccc;
        background-color: white;
        z-index: 1;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        transition: all 0.3s ease;
    }

    .timeline-step .line {
        position: absolute;
        left: 11px;
        top: 24px;
        width: 2px;
        height: calc(100% - 24px);
        background-color: #ccc;
        z-index: 0;
        transition: all 0.3s ease;
    }

    .timeline-step.completed .circle {
        background: linear-gradient(135deg, #28a745, #21c484);
        border-color: #28a745;
    }

    .timeline-step.completed .line {
        background: linear-gradient(135deg, #28a745, #21c484);
    }

    .timeline-step:last-child .line {
        display: none;
    }

    .timeline-step .content {
        margin-left: 50px;
        transition: all 0.3s ease;
    }

    .tracking-step {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        accent-color: #0d6efd; /* modern blue color */
        cursor: pointer;
        transition: transform 0.2s ease;
    }

    .tracking-step:checked {
        transform: scale(1.2);
    }

    /* Remarks styling */
    #remarks {
        border-radius: 12px;
        box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
        transition: all 0.2s ease;
    }

    #remarks:focus {
        border-color: #0d6efd;
        box-shadow: 0px 4px 12px rgba(13, 110, 253, 0.25);
    }
</style>
