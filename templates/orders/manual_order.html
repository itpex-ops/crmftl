{% extends 'layouts/base.html' %}
{% block content %}

<div class="container mt-4">
    <h3>Create Order</h3>

    <form method="POST">
        {% csrf_token %}
        <div class="row">
            {% for field in form %}
                <div class="col-md-6 mb-3">
                    <label>{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
        </div>

        <button class="btn btn-primary">Save Order</button>
    </form>
</div>

{% endblock %}
