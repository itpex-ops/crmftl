{% extends 'layouts/base.html' %}
{% block content %}

<h4>Vehicle Ledger - {{ vehicle.vehicle_number }}</h4>

<table class="table table-bordered">

<thead>
<tr>
<th>Date</th>
<th>Remarks</th>
<th>Debit</th>
<th>Credit</th>
<th>Balance</th>
</tr>
</thead>

<tbody>

{% for row in ledger %}
<tr>
<td>{{ row.date }}</td>
<td>{{ row.remarks }}</td>
<td>₹{{ row.debit }}</td>
<td>₹{{ row.credit }}</td>
<td><b>₹{{ row.balance }}</b></td>
</tr>
{% endfor %}

</tbody>

</table>

{% endblock %}
