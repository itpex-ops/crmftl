<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Style Fold / Unfold Card</title>

<style>
body{
    background:#f1f3f4;
    font-family:Arial, sans-serif;
    padding:40px;
}

.history-card{
    width:500px;
    background:#fff;
    border-radius:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    overflow:hidden;
}

.card-title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 20px;
    cursor:pointer;
    user-select:none;
}

#title-left-content{
    display:flex;
    flex-direction:column;
}

#device-name{
    font-size:16px;
    font-weight:600;
    color:#202124;
}

#last-update-time{
    font-size:13px;
    color:#5f6368;
    margin-top:4px;
}

#right-buttons{
    display:flex;
    align-items:center;
    gap:8px;
}

.icon-btn{
    width:34px;
    height:34px;
    border:none;
    background:transparent;
    border-radius:50%;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

.icon-btn:hover{
    background:#f1f3f4;
}

#collapseButton{
    transition:transform 0.3s ease;
}

.card-body{
    display:none;
    padding:0 20px 18px;
    border-top:1px solid #eee;
}

.card-body ul{
    padding-left:18px;
    margin:12px 0 0;
}

.card-body li{
    padding:6px 0;
    color:#444;
    font-size:14px;
}

.history-card.active .card-body{
    display:block;
}

.history-card.active #collapseButton{
    transform:rotate(180deg);
}
</style>
</head>
<body>

<div class="history-card" id="historyCard">

    <div class="card-title" onclick="toggleCard()">
        
        <div id="title-left-content">
            <div id="device-name">Windows PC</div>
            <span id="last-update-time">4 hours ago</span>
        </div>

        <div id="right-buttons">
            <button class="icon-btn">⋮</button>
            <button class="icon-btn" id="collapseButton">⌄</button>
        </div>

    </div>

    <div class="card-body">
        <ul>
            <li>youtube.com</li>
            <li>chat.openai.com</li>
            <li>github.com</li>
            <li>gmail.com</li>
        </ul>
    </div>

</div>

<script>
function toggleCard(){
    document.getElementById("historyCard").classList.toggle("active");
}
</script>

</body>
</html>
