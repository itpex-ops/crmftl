{% extends 'layouts/base.html' %}
{% block content %}

<div class="container mt-4">

    <!-- HEADER -->
    <div class="card shadow-sm border-0 p-3 mb-4 header-card">
        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <div>
                <h4 class="mb-1 fw-bold text-dark">📍 Vehicle Tracking</h4>
                <small class="text-muted">
                    {{ vehicle.vehicle_number }} | Order : {{ vehicle.order.order_no }}
                </small>
            </div>

            <a href="{% url 'all_assigned_vehicles' %}" class="btn btn-light border">
                ← Back
            </a>

        </div>
    </div>

    <!-- FORM -->
    <form method="POST">
        {% csrf_token %}

        <div class="card shadow-sm border-0 p-4">

            <div class="row g-4">

                <!-- LEFT -->
                <div class="col-md-6">
                    <div class="step-box">

                        <label class="track-item">
                            <input type="checkbox" class="tracking-checkbox" name="vehicle_placed"
                                {% if tracking.vehicle_placed %}checked{% endif %}>
                            🚚 Vehicle Placed
                        </label>

                        <label class="track-item">
                            <input type="checkbox" class="tracking-checkbox" name="vehicle_document"
                                {% if tracking.vehicle_document %}checked{% endif %}>
                            📄 Vehicle Document
                        </label>

                        <label class="track-item">
                            <input type="checkbox" class="tracking-checkbox" name="invoice_eway"
                                {% if tracking.invoice_eway %}checked{% endif %}>
                            🧾 Invoice / E-way
                        </label>

                        <label class="track-item">
                            <input type="checkbox" class="tracking-checkbox" name="advance_to_fleet"
                                {% if tracking.advance_to_fleet %}checked{% endif %}>
                            💰 Advance To Fleet
                        </label>

                        <label class="track-item">
                            <input type="checkbox" class="tracking-checkbox" name="fleet_departed"
                                {% if tracking.fleet_departed %}checked{% endif %}>
                            🚛 Fleet Departed
                        </label>

                    </div>
                </div>

                <!-- RIGHT -->
                <div class="col-md-6">
                    <div class="step-box">

                        <label class="track-item">
                            <input type="checkbox" class="tracking-checkbox" name="advance_received"
                                {% if tracking.advance_received %}checked{% endif %}>
                            💵 Advance Received
                        </label>

                        <label class="track-item">
                            <input type="checkbox" class="tracking-checkbox" name="arrived"
                                {% if tracking.arrived %}checked{% endif %}>
                            📍 Arrived
                        </label>

                        <label class="track-item">
                            <input type="checkbox" class="tracking-checkbox" name="delivered"
                                {% if tracking.delivered %}checked{% endif %}>
                            ✅ Delivered
                        </label>

                        <label class="track-item">
                            <input type="checkbox" class="tracking-checkbox" name="pod_received"
                                {% if tracking.pod_received %}checked{% endif %}>
                            📦 POD Received
                        </label>

                        <label class="track-item">
                            <input type="text" class="form-control" name="lr_no"
                                value="{{ tracking.lr_no|default:'' }}"
                                placeholder="LR No">
                        </label>

                        <!-- SETTLED -->
                        <label class="track-item">
                            <input type="checkbox" class="tracking-checkbox" id="settledBox" name="settled"
                                {% if tracking.settled %}checked{% endif %}>
                            🧮 Settled
                        </label>

                    </div>
                </div>

            </div>

            <!-- REMARKS -->
            <div class="mt-4">
                <label class="fw-semibold mb-2">Remarks</label>
                <textarea name="remarks" rows="4" class="form-control remarks-box">{{ tracking.remarks }}</textarea>
            </div>

            <!-- BUTTONS -->
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-success px-4">💾 Save</button>
                <a href="{% url 'all_assigned_vehicles' %}" class="btn btn-light border px-4">Cancel</a>
            </div>

        </div>
    </form>

</div>

<!-- JS: SINGLE SELECT + SETTLED LOCK -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const checkboxes = document.querySelectorAll(".tracking-checkbox");
    const settledBox = document.getElementById("settledBox");

    function lockSingle(selected) {

        checkboxes.forEach(box => {

            const row = box.closest(".track-item");

            if (box !== selected) {
                box.checked = false;
                box.disabled = true;
                row.classList.add("disabled-row");
            } else {
                box.disabled = false;
                row.classList.add("selected-row");
            }

        });

    }

    function unlockAll() {

        checkboxes.forEach(box => {
            const row = box.closest(".track-item");
            box.disabled = false;
            row.classList.remove("disabled-row", "selected-row");
        });

    }

    // 🔥 SINGLE CHECK RULE
    checkboxes.forEach(box => {

        if (box === settledBox) return;

        box.addEventListener("change", function () {

            if (this.checked) {
                lockSingle(this);

                // unset settled if any other selected
                if (settledBox) settledBox.checked = false;

            } else {
                unlockAll();
            }

        });

    });

    // 🔥 SETTLED LOCK EVERYTHING
    if (settledBox && settledBox.checked) {
        checkboxes.forEach(box => {

            if (box !== settledBox) {
                box.checked = false;
                box.disabled = true;
                box.closest(".track-item").classList.add("disabled-row");
            }

        });
    }

    if (settledBox) {
        settledBox.addEventListener("change", function () {

            if (this.checked) {
                checkboxes.forEach(box => {

                    if (box !== settledBox) {
                        box.checked = false;
                        box.disabled = true;
                        box.closest(".track-item").classList.add("disabled-row");
                    }

                });
            } else {
                unlockAll();
            }

        });
    }

});
</script>

<!-- STYLE -->
<style>
body {
    background: #f5f7fb;
}

.header-card {
    border-radius: 16px;
}

.step-box {
    background: #fff;
    border-radius: 16px;
    padding: 18px;
    border: 1px solid #edf0f5;
}

.track-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px;
    border: 1px solid #eef1f4;
    border-radius: 12px;
    margin-bottom: 12px;
    cursor: pointer;
    background: #fafbfc;
    font-weight: 500;
}

.track-item input {
    transform: scale(1.1);
}

.disabled-row {
    opacity: 0.5;
    background: #f1f3f5;
    pointer-events: none;
}

.selected-row {
    background: #e8fff4;
    border-color: #16a34a;
}

.remarks-box {
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    padding: 12px;
}

.btn-success {
    background: #16a34a;
    border-radius: 10px;
}

.btn-light {
    border-radius: 10px;
}
</style>

{% endblock %}
